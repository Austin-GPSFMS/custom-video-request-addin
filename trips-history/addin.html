<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Custom Video Request</title>
  <link rel="stylesheet" href="addin.css">
</head>
<body>
  <!-- Trips History side-panel launcher -->
  <div id="cvr-panel">
    <div id="cvr-panel-head">
      <span id="cvr-panel-title">Camera Video</span>
    </div>

    <div id="cvr-search">
      <label for="cvr-address">Find address</label>
      <div class="cvr-search-row">
        <input type="text" id="cvr-address" placeholder="123 Main St, City, ST" autocomplete="off" />
        <button id="cvr-find" class="cvr-btn cvr-btn-primary" type="button">Go</button>
      </div>
      <div id="cvr-find-status" class="cvr-muted"></div>
    </div>

    <hr class="cvr-divider" />

    <div id="cvr-panel-context" class="cvr-muted">Select a camera-equipped vehicle on the map.</div>
    <button id="cvr-open" class="cvr-btn cvr-btn-primary" type="button" disabled>Request custom video recording</button>
    <div id="cvr-panel-status" class="cvr-muted"></div>
  </div>

  <!-- Modal overlay (styled like the native dialog) -->
  <div id="cvr-modal" class="cvr-modal-backdrop" hidden>
    <div class="cvr-modal" role="dialog" aria-modal="true" aria-labelledby="cvr-modal-title">
      <header class="cvr-modal-head">
        <span class="cvr-head-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="20" height="20"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/><line x1="12" y1="11" x2="12" y2="16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="7.5" r="1.2" fill="currentColor"/></svg>
        </span>
        <h2 id="cvr-modal-title">Request custom video recording</h2>
        <button id="cvr-x" class="cvr-x" type="button" aria-label="Close">&times;</button>
      </header>

      <div class="cvr-modal-body">
        <div class="cvr-warning"><strong>Warning: Data Usage.</strong> Pulling footage uses the camera's cellular data and may incur cost.</div>
        <p class="cvr-intro">Set the recording duration settings for the event you want to view:</p>

        <form id="cvr-form" autocomplete="off">
          <div class="cvr-row">
            <label for="cvr-camera">Camera / vehicle</label>
            <select id="cvr-camera" required><option value="" disabled selected>Loading…</option></select>
          </div>
          <div class="cvr-row">
            <label for="cvr-start">Event start time</label>
            <input type="datetime-local" id="cvr-start" step="1" required />
          </div>
          <div class="cvr-row">
            <label for="cvr-duration">Recording duration</label>
            <select id="cvr-duration" required>
              <option value="10" selected>10 seconds</option>
              <option value="15">15 seconds</option>
              <option value="20">20 seconds</option>
              <option value="30">30 seconds</option>
              <option value="45">45 seconds</option>
              <option value="60">60 seconds</option>
              <option value="120">2 minutes</option>
            </select>
          </div>
          <div id="cvr-window-hint" class="cvr-muted"></div>
        </form>

        <div id="cvr-status" class="cvr-status" role="status" aria-live="polite"></div>
      </div>

      <footer class="cvr-modal-foot">
        <button id="cvr-cancel" class="cvr-btn cvr-btn-secondary" type="button">Cancel</button>
        <button id="cvr-submit" class="cvr-btn cvr-btn-primary" type="button">Request recording</button>
      </footer>
    </div>
  </div>

  <script src="addin.js"></script>
</body>
</html>
